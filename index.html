<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon48.png">
  <link rel="apple-touch-icon" href="icon128.png">
  <title>NIUMA TO DO</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="container">
    <div class="title-row">
      <h1><img src="icon128.png" class="title-icon"> NIUMA TO DO</h1>
      <div class="title-actions">
        <button id="settingsBtn" title="Settings">⚙️</button>
        <button id="themeToggle" title="Toggle theme">☀️</button>
      </div>
    </div>
    <div id="settingsPanel" style="display:none">
      <label>Gist ID<input type="text" id="gistId" placeholder="abc123..."></label>
      <label>Token<input type="password" id="gistToken" placeholder="ghp_..."></label>
      <button id="saveSettings">Save</button>
    </div>
    <div class="toolbar">
      <label><input type="checkbox" id="hideDone"> Hide completed</label>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="work">Work</button>
      <button class="tab-btn" data-tab="personal">Personal</button>
    </div>
    <div class="input-row">
      <input type="text" id="todoInput" placeholder="Add a task..." autofocus>
      <input type="date" id="ddlInput" title="Due date (optional)">
      <button id="addBtn">+</button>
    </div>
    <ul id="todoList"></ul>
    <div id="trashPanel"></div>
    <div class="footer-row">
      <div class="footer" id="footer"></div>
      <button id="trashBtn" title="Trash">🗑️</button>
    </div>
  </div>
  <script src="gist.js"></script>
  <script src="app.js"></script>
</body>
</html>
